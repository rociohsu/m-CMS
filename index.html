<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>商店菜單管理系統</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Lucide Icons CDN -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <!-- Supabase JS CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    /* 小螢幕樣式 */
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    
    /* 動畫效果 */
    @keyframes slideIn {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }
    .animate-in {
      animation: slideIn 0.25s ease-out forwards;
    }
    
    /* 區塊陰影 */
    .shadow-premium {
      box-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.05), 0 5px 15px -8px rgba(0, 0, 0, 0.05);
    }

    /* 拖曳時樣式 */
    .dragging-active {
      opacity: 0.4 !important;
      transform: scale(0.97);
      transition: transform 0.15s ease, opacity 0.15s ease;
    }
  </style>
</head>
<body class="bg-gray-100 text-gray-800 antialiased font-sans">

  <!-- 這是手機版輸出容器，最大寬度限制為 max-w-md -->
  <div class="max-w-md mx-auto min-h-screen bg-gray-50 flex flex-col relative shadow-2xl">
    
    <!-- 頁首區塊 -->
    <header class="bg-white border-b border-gray-100 sticky top-0 z-10">
      <!-- 1. 上方狀態列 / App Topbar -->
      <div class="bg-gray-50 border-b border-gray-100 px-4 py-1.5 flex justify-between items-center text-[12px] text-gray-500 font-medium select-none">
        <div class="flex items-center space-x-1">
          <i data-lucide="store" class="w-3.5 h-3.5 text-orange-500"></i>
          <span class="font-bold text-gray-700">商店菜單</span>
        </div>
        <span class="text-gray-400 text-[11px]">菜單管理系統</span>
      </div>

      <!-- 2. 功能列：設定 icon -> 批次模式 -> 登入 / 會員區 -->
      <div class="px-4 pt-3.5 pb-3 flex justify-between items-center">
        <div class="flex items-center space-x-2.5">
          <!-- 2-1. 設定 icon -->
          <button 
            onclick="openStoreSettings()"
            class="p-2.5 bg-gray-50 text-gray-400 rounded-full hover:bg-orange-50 hover:text-orange-500 transition-all shadow-sm active:scale-95"
          >
            <i data-lucide="settings" class="w-[20px] h-[20px]"></i>
          </button>

          <!-- 2-2. 批次模式按鈕 -->
          <button 
            onclick="toggleBatchMode()"
            id="batch-btn"
            class="flex items-center space-x-1.5 px-4 py-2 rounded-full text-[13px] font-bold bg-orange-50 text-orange-500 transition-all shadow-sm active:scale-95"
          >
            <i data-lucide="list-checks" class="w-[18px] h-[18px]"></i>
            <span id="batch-btn-text">批次模式</span>
          </button>
        </div>

        <!-- 2-3 / 5. 右側登入區塊 (顯示登入/會員資訊) -->
        <div id="header-auth-area" class="flex items-center">
          <!-- 這裡會動態渲染登入或會員資訊 -->
        </div>
      </div>

      <!-- Tab 分頁 -->
      <div class="flex px-4 border-b border-gray-50">
        <!-- 5. 初始啟用主餐 Tab -->
        <button onclick="switchTab('main')" id="tab-main" class="flex-1 py-3 text-[15px] font-bold border-b-2 text-center transition-all border-orange-500 text-orange-500">主餐</button>
        <button onclick="switchTab('addon')" id="tab-addon" class="flex-1 py-3 text-[15px] font-bold border-b-2 text-center transition-all border-transparent text-gray-400">加購</button>
        <button onclick="switchTab('menu')" id="tab-menu" class="flex-1 py-3 text-[15px] font-bold border-b-2 text-center transition-all border-transparent text-gray-400">時段菜單</button>
      </div>
      
      <!-- 搜尋欄說明：依不同 Tab 搜尋內容 -->
      <div id="search-category-bar" class="px-4 py-3">
        <div class="relative mb-3">
          <i data-lucide="search" class="absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400 w-5 h-5"></i>
          <input 
            type="text" 
            id="search-input"
            oninput="handleSearch(this.value)"
            placeholder="搜尋..." 
            class="w-full bg-gray-100 border-none rounded-xl py-3 pl-11 pr-4 focus:ring-2 focus:ring-orange-500 transition-all outline-none text-[15px]"
          />
        </div>
        <div class="flex items-center space-x-2">
          <div id="category-capsules" class="flex space-x-2 overflow-x-auto no-scrollbar flex-grow py-1">
            <!-- 分類標籤區 -->
          </div>
          <button onclick="openCategoryModal()" class="p-2.5 bg-gray-100 text-gray-600 rounded-lg shadow-sm flex-shrink-0 active:bg-orange-50 active:text-orange-500 transition-colors">
            <i data-lucide="settings-2" class="w-[20px] h-[20px]"></i>
          </button>
        </div>
      </div>
    </header>

    <!-- 主內容呈現區 -->
    <main id="main-content" class="px-4 py-4 flex-grow space-y-3 pb-24">
      <!-- 這裡會動態渲染主內容 -->
    </main>

    <!-- 新增按鈕 (FAB) -->
    <button 
      id="global-fab"
      onclick="handleFabClick()"
      class="fixed bottom-8 right-6 w-16 h-16 bg-orange-500 text-white rounded-full shadow-2xl flex items-center justify-center transform active:scale-90 transition-transform z-20"
    >
      <i data-lucide="plus" class="w-8 h-8"></i>
    </button>

    <!-- 批次操作工具列 -->
    <div 
      id="batch-bar" 
      class="fixed bottom-6 left-4 right-4 bg-gray-900 text-white rounded-[2rem] p-6 shadow-2xl z-30 hidden"
    >
      <div class="flex items-center justify-between mb-5 border-b border-gray-700 pb-3">
        <span id="batch-count" class="text-[15px] font-bold">已選取 0 筆資料</span>
        <div class="flex items-center space-x-4">
          <button onclick="batchSelectAll()" class="text-[13px] text-orange-400 font-bold">全選</button>
          <button onclick="toggleBatchMode(false)" class="text-[13px] text-gray-400 font-medium">取消</button>
        </div>
      </div>
      <div class="grid grid-cols-5 gap-2 text-center">
        <button onclick="triggerBatchAction('active')" class="flex flex-col items-center">
          <div class="p-3 bg-green-500/20 text-green-400 rounded-2xl mb-2"><i data-lucide="play-circle" class="w-6 h-6"></i></div>
          <span class="text-[13px]">上架</span>
        </button>
        <button onclick="triggerBatchAction('inactive')" class="flex flex-col items-center">
          <div class="p-3 bg-gray-500/20 text-gray-400 rounded-2xl mb-2"><i data-lucide="stop-circle" class="w-6 h-6"></i></div>
          <span class="text-[13px]">下架</span>
        </button>
        <button onclick="triggerBatchAction('inactive-today')" class="flex flex-col items-center">
          <div class="p-3 bg-blue-500/20 text-blue-400 rounded-2xl mb-2"><i data-lucide="calendar-x" class="w-6 h-6"></i></div>
          <span class="text-[13px]">今日下架</span>
        </button>
        <button id="batch-restock-btn" onclick="triggerBatchAction('restock')" class="flex flex-col items-center">
          <div class="p-3 bg-orange-500/20 text-orange-400 rounded-2xl mb-2"><i data-lucide="rotate-ccw" class="w-6 h-6"></i></div>
            <span class="text-[13px]">補貨</span>
        </button>
        <button onclick="triggerBatchAction('delete')" class="flex flex-col items-center text-red-400">
          <div class="p-3 bg-red-500/20 rounded-2xl mb-2"><i data-lucide="trash" class="w-6 h-6"></i></div>
          <span class="text-[13px]">刪除</span>
        </button>
      </div>
    </div>

    <!-- 個人資料 Modal -->
    <div id="modal-profile" class="fixed inset-0 bg-white z-[90] flex flex-col hidden overflow-y-auto">
      <div class="px-4 py-5 flex items-center justify-between border-b border-gray-100 bg-white sticky top-0 shadow-sm z-10">
        <button onclick="closeProfileModal()" class="p-1 text-gray-600"><i data-lucide="arrow-left" class="w-7 h-7"></i></button>
        <h2 class="text-[20px] font-bold" id="profile-modal-title">使用者資訊</h2>
        <div class="w-8"></div>
      </div>
      
      <!-- 6. 個人資訊內容將由 renderAuthUI() 動態填充 -->
      <div class="p-6 space-y-6 max-w-md mx-auto w-full flex-grow flex flex-col justify-between" id="profile-content-container">
        <!-- 這裡由 renderAuthUI() 動態填充會員內容 -->
      </div>
    </div>

  </div>

  <!-- ==================== MODALS 動態區 ==================== -->

  <!-- 1. 餐點編輯 Modal -->
  <div id="modal-item" class="fixed inset-0 bg-white z-50 flex flex-col hidden overflow-y-auto">
    <div class="px-4 py-5 flex items-center justify-between border-b border-gray-100 bg-white sticky top-0 shadow-sm z-10">
      <button onclick="closeItemModal()" class="p-1 text-gray-600"><i data-lucide="arrow-left" class="w-7 h-7"></i></button>
      <h2 id="modal-item-title" class="text-[20px] font-bold">新增餐點</h2>
      <button onclick="saveItem()" class="px-5 py-2 bg-orange-500 text-white text-[15px] font-bold rounded-full shadow-md active:scale-95 transition-transform">儲存</button>
    </div>
    
    <div class="p-4 space-y-6 pb-20 max-w-md mx-auto w-full">
      <!-- 商品圖片區 -->
      <div class="group relative w-full h-56 bg-gray-50 rounded-[2rem] border-2 border-dashed border-gray-200 flex flex-col items-center justify-center overflow-hidden">
        <div id="img-preview-container" class="w-full h-full hidden relative">
          <img id="item-img-preview" src="" class="w-full h-full object-cover" />
          <div class="absolute inset-0 bg-black/30 flex items-center justify-center space-x-5">
            <label class="cursor-pointer bg-white/90 p-4 rounded-full shadow-xl">
              <i data-lucide="refresh-cw" class="text-orange-500 w-6 h-6"></i>
              <input type="file" class="hidden" accept="image/*" onchange="previewImage(event)" />
            </label>
            <button onclick="removeImage()" class="bg-red-500/90 p-4 rounded-full text-white shadow-xl">
              <i data-lucide="trash-2" class="w-6 h-6"></i>
            </button>
          </div>
        </div>
        <label id="img-placeholder" class="cursor-pointer flex flex-col items-center justify-center w-full h-full">
          <i data-lucide="camera" class="text-orange-500 mb-3 w-10 h-10"></i>
          <span class="text-[15px] font-medium text-gray-500">上傳商品圖片</span>
          <input type="file" class="hidden" accept="image/*" onchange="previewImage(event)" />
        </label>
      </div>

      <!-- 基本資料 -->
      <div class="space-y-6">
        <div>
          <label class="block text-[13px] font-bold text-gray-400 mb-2 ml-1">品項名稱</label>
          <input type="text" id="item-name" placeholder="請輸入品項名稱" class="w-full bg-gray-50 border border-gray-200 rounded-2xl px-5 py-4 outline-none focus:border-orange-500 transition-all text-[15px] font-bold" />
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-[13px] font-bold text-gray-400 mb-2 ml-1">價格</label>
            <div class="relative">
              <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 font-bold">$</span>
              <input type="number" id="item-price" class="w-full bg-gray-50 border border-gray-200 rounded-2xl pl-10 pr-5 py-4 outline-none focus:border-orange-500 transition-all text-[15px] font-bold" />
            </div>
          </div>
          <div>
            <label class="block text-[13px] font-bold text-gray-400 mb-2 ml-1">類別選擇</label>
            <div class="flex gap-2">
              <div class="relative flex-grow">
                <select id="item-category" class="w-full bg-gray-50 border border-gray-200 rounded-2xl px-5 py-4 outline-none appearance-none bg-white text-[15px] font-bold">
                  <!-- 請選擇類別 -->
                </select>
                <i data-lucide="chevron-down" class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 pointer-events-none w-5 h-5"></i>
              </div>
              <button onclick="openCategoryModal()" class="p-4 bg-gray-50 border border-gray-200 rounded-2xl text-gray-400 shadow-sm active:bg-orange-50 active:text-orange-500 font-bold">
                <i data-lucide="settings-2" class="w-5 h-5"></i>
              </button>
            </div>
          </div>
        </div>

        <!-- 商品狀態選擇 -->
        <div>
          <label class="block text-[13px] font-bold text-gray-400 mb-3 ml-1">商品狀態設定</label>
          <div class="flex bg-gray-100 p-1.5 rounded-[1.5rem] shadow-inner border border-gray-200/50">
            <button onclick="setItemStatus('active')" id="btn-status-active" class="flex-1 py-3 text-[13px] rounded-2xl transition-all text-gray-500 font-bold">上架</button>
            <button onclick="setItemStatus('inactive')" id="btn-status-inactive" class="flex-1 py-3 text-[13px] rounded-2xl transition-all text-gray-500 font-bold">下架</button>
            <button onclick="setItemStatus('inactive-today')" id="btn-status-inactive-today" class="flex-1 py-3 text-[13px] rounded-2xl transition-all text-gray-500 font-bold">今日下架</button>
          </div>
        </div>

        <!-- 備註設定 -->
        <div class="bg-gray-50 rounded-[2rem] p-6 border border-gray-100 flex items-center justify-between">
          <div class="flex items-center space-x-4">
            <div class="p-3 bg-white text-orange-500 rounded-2xl shadow-sm"><i data-lucide="message-square" class="w-6 h-6"></i></div>
            <div>
              <span class="text-[15px] font-bold text-gray-800">特別備註</span>
              <p class="text-[13px] text-gray-400">可在這裡輸入餐點備註</p>
            </div>
          </div>
          <button id="btn-remarks-toggle" onclick="toggleItemRemarks()"><i data-lucide="toggle-right" class="text-orange-500 w-11 h-11"></i></button>
        </div>

        <!-- 庫存設定區 -->
        <div class="bg-gray-50 rounded-[2rem] p-6 border border-gray-100">
          <div class="flex items-center justify-between mb-5">
            <div class="flex items-center space-x-4">
              <div class="p-3 bg-white text-orange-500 rounded-2xl shadow-sm"><i data-lucide="box" class="w-6 h-6"></i></div>
              <span class="text-[15px] font-bold text-gray-800">庫存與補貨設定</span>
            </div>
            <button id="btn-stock-toggle" onclick="toggleItemStock()"><i data-lucide="toggle-left" class="text-gray-300 w-11 h-11"></i></button>
          </div>
          <div id="stock-fields" class="grid grid-cols-2 gap-4 hidden">
            <div class="space-y-2">
              <label class="text-[13px] font-bold text-gray-400 ml-1">目前庫存</label>
              <input type="number" id="item-stock" placeholder="0" class="w-full bg-white border border-gray-200 rounded-2xl px-4 py-3.5 text-[15px] font-bold outline-none focus:ring-1 focus:ring-orange-500" />
            </div>
            <div class="space-y-2">
              <label class="text-[13px] font-bold text-gray-400 ml-1">補貨數量</label>
              <input type="number" id="item-restock" placeholder="0" class="w-full bg-white border border-gray-200 rounded-2xl px-4 py-3.5 text-[15px] font-bold outline-none focus:ring-1 focus:ring-orange-500" />
            </div>
          </div>
        </div>

        <!-- 加購設定區 -->
        <div class="bg-gray-50 rounded-[2rem] p-6 border border-gray-100">
          <label class="block text-[15px] font-bold text-gray-700 mb-4 flex items-center">
            <i data-lucide="layers" class="mr-2 text-orange-500 w-5 h-5"></i> 加購品項設定
          </label>
          <div id="item-addons-list" class="space-y-3">
            <!-- 這裡會顯示加購項目 -->
          </div>
        </div>

        <!-- 標籤設定 -->
        <div>
          <label class="block text-[15px] font-bold text-gray-700 mb-3 flex items-center">
            <i data-lucide="tag" class="mr-2 text-orange-500 w-5 h-5"></i> 商品標籤
          </label>
          <div id="item-tags-container" class="flex flex-wrap gap-2 mb-4">
            <!-- 標籤將顯示在商品卡片 -->
          </div>
          <div class="flex gap-3">
            <input type="text" id="tag-input" placeholder="新增標籤" class="flex-grow bg-gray-50 border border-gray-200 rounded-2xl px-5 py-3.5 text-[15px] outline-none focus:border-orange-500" />
            <button onclick="addTagFromInput()" class="p-3.5 bg-gray-100 text-gray-600 rounded-2xl hover:bg-orange-100 active:scale-95 transition-all">
              <i data-lucide="plus" class="w-6 h-6"></i>
            </button>
          </div>
        </div>
      </div>

      <!-- 刪除商品按鈕 -->
      <button id="delete-item-btn" onclick="deleteCurrentItem()" class="w-full py-5 text-red-500 text-[15px] font-bold border border-red-100 rounded-3xl mt-8 mb-12 shadow-sm active:bg-red-50 transition-colors hidden">刪除此商品</button>
    </div>
  </div>

  <!-- 2. 加購群組 Modal -->
  <div id="modal-addon" class="fixed inset-0 bg-white z-50 flex flex-col hidden overflow-y-auto">
    <div class="px-4 py-5 flex items-center justify-between border-b border-gray-100 bg-white sticky top-0 shadow-sm z-10">
      <button onclick="closeAddonModal()" class="p-1 text-gray-600"><i data-lucide="arrow-left" class="w-7 h-7"></i></button>
      <h2 id="modal-addon-title" class="text-[20px] font-bold">加購群組設定</h2>
      <button onclick="saveAddonGroup()" class="px-5 py-2 bg-orange-500 text-white text-[15px] font-bold rounded-full shadow-md">儲存</button>
    </div>

    <div class="p-4 space-y-8 pb-20 max-w-md mx-auto w-full">
      <div>
        <label class="block text-[13px] font-bold text-gray-400 mb-2 ml-1">加購群組名稱</label>
        <input type="text" id="addon-group-name" placeholder="請輸入加購群組名稱" class="w-full bg-gray-50 border border-gray-200 rounded-2xl px-5 py-4 outline-none focus:border-orange-500 transition-all text-[15px] font-bold" />
      </div>

      <!-- 加購狀態設定 -->
      <div>
        <label class="block text-[13px] font-bold text-gray-400 mb-3 ml-1">加購狀態</label>
        <div class="flex bg-gray-100 p-1.5 rounded-[1.5rem] shadow-inner border border-gray-200/50">
          <button onclick="setAddonGroupStatus('active')" id="btn-addon-status-active" class="flex-1 py-3 text-[13px] rounded-2xl transition-all text-gray-500 font-bold">上架</button>
          <button onclick="setAddonGroupStatus('inactive')" id="btn-addon-status-inactive" class="flex-1 py-3 text-[13px] rounded-2xl transition-all text-gray-500 font-bold">下架</button>
          <button onclick="setAddonGroupStatus('inactive-today')" id="btn-addon-status-inactive-today" class="flex-1 py-3 text-[13px] rounded-2xl transition-all text-gray-500 font-bold">今日下架</button>
        </div>
      </div>

      <!-- 選擇模式 -->
      <div>
        <label class="block text-[13px] font-bold text-gray-400 mb-2 ml-1">選擇模式</label>
        <div class="flex bg-gray-100 p-1.5 rounded-[1.5rem]">
          <button onclick="setAddonSelectionMode('single')" id="btn-addon-mode-single" class="flex-1 py-2 text-[13px] rounded-xl transition-all text-gray-500 font-bold">單選</button>
          <button onclick="setAddonSelectionMode('multiple')" id="btn-addon-mode-multiple" class="flex-1 py-2 text-[13px] rounded-xl transition-all text-gray-500 font-bold">複選</button>
        </div>
      </div>

      <!-- 加購品項區 (可新增品項) -->
      <div class="space-y-6">
        <div class="flex justify-between items-center px-1 border-b border-gray-100 pb-3">
          <label class="text-[15px] font-bold text-gray-800">加購品項列表</label>
          <button onclick="addAddonOption()" class="text-orange-500 text-[13px] font-bold flex items-center bg-orange-50 px-3 py-1.5 rounded-full font-bold">
            <i data-lucide="plus" class="w-4 h-4 mr-1"></i> 新增品項
          </button>
        </div>
        <div id="addon-options-list" class="space-y-4">
          <!-- 加購品項列表 (編輯模式) -->
        </div>
      </div>

      <!-- 刪除此加購群組按鈕 -->
      <button id="delete-addon-group-btn" onclick="deleteCurrentAddonGroup()" class="w-full py-5 bg-white text-red-500 text-[15px] font-bold border border-red-100 rounded-3xl mt-8 mb-12 shadow-sm active:bg-red-50 transition-colors hidden font-bold">刪除此加購群組</button>
    </div>
  </div>

  <!-- 3. 時段菜單 Modal -->
  <div id="modal-menu" class="fixed inset-0 bg-white z-50 flex flex-col hidden overflow-y-auto">
    <div class="px-4 py-5 flex items-center justify-between border-b border-gray-100 bg-white sticky top-0 shadow-sm z-10">
      <button onclick="closeMenuModal()" class="p-1 text-gray-600"><i data-lucide="arrow-left" class="w-7 h-7"></i></button>
      <h2 id="modal-menu-title" class="text-[20px] font-bold">新增時段菜單</h2>
      <button onclick="saveScheduledMenu()" class="px-5 py-2 bg-orange-500 text-white text-[15px] font-bold rounded-full shadow-md">儲存</button>
    </div>

    <div class="p-4 space-y-8 pb-20 max-w-md mx-auto w-full">
      <div>
        <label class="block text-[13px] font-bold text-gray-400 mb-2 ml-1">菜單名稱</label>
        <input type="text" id="menu-name" placeholder="請輸入菜單名稱" class="w-full bg-gray-50 border border-gray-200 rounded-2xl px-5 py-4 outline-none focus:border-orange-500 transition-all text-[15px] font-bold" />
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div class="space-y-2">
          <label class="text-[13px] font-bold text-gray-400 ml-1">開始時間</label>
          <input type="time" id="menu-start" class="w-full bg-gray-50 border border-gray-200 rounded-2xl px-5 py-4 outline-none text-[15px] font-bold" />
        </div>
        <div class="space-y-2">
          <label class="text-[13px] font-bold text-gray-400 ml-1">結束時間</label>
          <input type="time" id="menu-end" class="w-full bg-gray-50 border border-gray-200 rounded-2xl px-5 py-4 outline-none text-[15px] font-bold" />
        </div>
      </div>

      <!-- 時段狀態設定 -->
      <div>
        <label class="block text-[13px] font-bold text-gray-400 mb-3 ml-1">時段狀態</label>
        <div class="flex bg-gray-100 p-1.5 rounded-[1.5rem] shadow-inner border border-gray-200/50">
          <button onclick="setMenuStatus('active')" id="btn-menu-status-active" class="flex-1 py-3 text-[13px] rounded-2xl transition-all text-gray-500 font-bold">啟用</button>
          <button onclick="setMenuStatus('inactive')" id="btn-menu-status-inactive" class="flex-1 py-3 text-[13px] rounded-2xl transition-all text-gray-500 font-bold">停用</button>
          <button onclick="setMenuStatus('inactive-today')" id="btn-menu-status-inactive-today" class="flex-1 py-3 text-[13px] rounded-2xl transition-all text-gray-500 font-bold">今日停用</button>
        </div>
      </div>

      <!-- 可選商品清單 -->
      <div class="bg-gray-50 rounded-[2rem] p-6 border border-gray-100">
        <label class="block text-[15px] font-bold text-gray-700 mb-5 flex items-center"><i data-lucide="layout-grid" class="mr-2 text-orange-500 w-5 h-5"></i> 時段可選商品</label>
        <div id="menu-items-select-list" class="space-y-3">
          <!-- 這裡會顯示商品 -->
        </div>
      </div>

      <!-- 刪除此時段菜單按鈕 -->
      <button id="delete-menu-btn" onclick="deleteCurrentMenu()" class="w-full py-5 bg-white text-red-500 text-[15px] font-bold border border-red-100 rounded-3xl mt-8 mb-12 shadow-sm active:bg-red-50 transition-colors hidden font-bold">刪除此時段菜單</button>
    </div>
  </div>

  <!-- 4. 店家設定 Modal -->
  <div id="modal-store-settings" class="fixed inset-0 bg-white z-[70] flex flex-col hidden overflow-y-auto">
    <div class="px-4 py-5 flex items-center justify-between border-b border-gray-100 bg-white sticky top-0 shadow-sm z-10">
      <button onclick="closeStoreSettings()" class="p-1 text-gray-600"><i data-lucide="arrow-left" class="w-7 h-7"></i></button>
      <h2 class="text-[20px] font-bold">店家設定</h2>
      <div class="w-8"></div>
    </div>
    
    <div class="flex-grow overflow-y-auto px-4 py-6 space-y-8 max-w-md mx-auto w-full">
      <!-- 備註設定區 -->
      <section class="bg-gray-50 rounded-3xl p-5 border border-gray-100">
        <div class="flex items-center justify-between">
          <div class="flex items-center space-x-4">
            <div class="p-3 bg-orange-100 text-orange-600 rounded-xl"><i data-lucide="message-square" class="w-6 h-6"></i></div>
            <div>
              <h3 class="font-bold text-gray-800 text-[15px]">全局備註設定</h3>
              <p class="text-[13px] text-gray-400 mt-0.5">可設定是否於結帳頁顯示備註</p>
            </div>
          </div>
          <button id="btn-global-remarks-toggle" onclick="toggleGlobalRemarks()">
            <i data-lucide="toggle-right" class="text-orange-500 w-11 h-11"></i>
          </button>
        </div>
      </section>

      <!-- 結帳加購品項區 -->
      <section class="space-y-5">
        <div class="flex justify-between items-end px-2">
          <div class="flex items-center space-x-4">
            <div class="p-3 bg-blue-100 text-blue-600 rounded-xl"><i data-lucide="shopping-bag" class="w-6 h-6"></i></div>
            <div>
              <h3 class="font-bold text-gray-800 text-[15px]">結帳加購選項</h3>
              <p class="text-[13px] text-gray-400 mt-0.5">可在這裡新增結帳頁面加購品項</p>
            </div>
          </div>
          <button onclick="addNewCheckoutAddon()" class="text-orange-500 text-[13px] font-bold flex items-center bg-orange-50 px-4 py-2 rounded-full active:scale-95 transition-transform font-bold">
            <i data-lucide="plus" class="w-4 h-4 mr-1"></i> 新增
          </button>
        </div>
        <div id="checkout-addons-list" class="space-y-4">
          <!-- 結帳加購品項清單 (可編輯) -->
        </div>
      </section>
    </div>
    
    <div class="p-5 bg-gray-50 border-t border-gray-100">
      <button onclick="closeStoreSettings()" class="w-full py-4 bg-gray-900 text-white font-bold rounded-2xl text-[15px] active:scale-95 transition-transform shadow-lg">關閉設定</button>
    </div>
  </div>

  <!-- 5. 分類管理視窗 -->
  <div id="modal-category" class="fixed inset-0 bg-white z-[60] flex flex-col hidden overflow-y-auto">
    <div class="px-4 py-5 flex items-center justify-between border-b border-gray-100 bg-white sticky top-0 shadow-sm z-10">
      <button onclick="closeCategoryModal()" class="p-1 text-gray-600"><i data-lucide="arrow-left" class="w-7 h-7"></i></button>
      <h2 class="text-[20px] font-bold">分類管理</h2>
      <div class="w-8"></div>
    </div>
    <div class="p-4 space-y-6 flex-grow overflow-y-auto max-w-md mx-auto w-full">
      <div class="flex gap-3">
        <input type="text" id="new-category-input" placeholder="請輸入新的分類" class="flex-grow bg-gray-50 border border-gray-200 rounded-2xl px-5 py-4 text-[15px] outline-none focus:border-orange-500 transition-all font-bold" />
        <button onclick="addCategory()" class="bg-orange-500 text-white px-5 rounded-2xl active:scale-90 transition-transform">
          <i data-lucide="plus" class="w-7 h-7"></i>
        </button>
      </div>
      <div id="categories-list-container" class="space-y-3">
        <!-- 這裡會顯示所有分類資料 (動態更新) -->
      </div>
    </div>
  </div>

    <!-- ==================== JAVASCRIPT 邏輯區 ==================== -->
  <script type="module">
    import { state } from "./js/state.js";
    import * as Auth from "./js/auth.js";
    import * as Common from "./js/common.js";

    window.state = state;
    Object.assign(window, Auth, Common);

    async function initializeApp() {
      await Auth.initAuth();
      Common.switchTab(state.activeTab);
    }

    if (document.readyState === 'loading') {
      window.addEventListener('DOMContentLoaded', initializeApp);
    } else {
      initializeApp();
    }
  </script>
</body>
</html>
